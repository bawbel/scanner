name: Publish to PyPI

# Triggers on a published GitHub Release (tag like v1.1.0)
# Flow:
#   Release published → Verify Tests → Build → Publish to TestPyPI
#   → (manual approval in GitHub "pypi" environment) → Publish to PyPI
on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

jobs:

  # 1. Verify tests pass
  test:
    name: Verify Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r scanner/ -c pyproject.toml -f screen

  # 2. Build distribution
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution
        run: |
          twine check dist/*
          ls -lh dist/
          pip install wheel
          python3 << 'PYEOF'
          import zipfile, os
          whl = [f for f in os.listdir('dist') if f.endswith('.whl')][0]
          z = zipfile.ZipFile('dist/' + whl)
          files = z.namelist()
          checks = [
              (any(f.endswith(('.yar', '.yaml')) for f in files), 'YARA/Semgrep rules missing'),
              (any(f.startswith('scanner/cli/') for f in files), 'scanner/cli/ missing'),
              (any(f.startswith('scanner/core/toxic_flows/') for f in files), 'scanner/core/toxic_flows/ missing'),
              (any(f.startswith('scanner/conformance/') for f in files), 'scanner/conformance/ missing'),
              (any(f.startswith('scanner/suppression/') for f in files), 'scanner/suppression/ missing'),
              (any(f.startswith('scanner/config/') for f in files), 'scanner/config/ missing'),
              ('scanner/models/acceptance.py' in files, 'scanner/models/acceptance.py missing'),
              (any('cmd_accept' in f for f in files), 'cmd_accept missing'),
              (any('cmd_creds' in f for f in files), 'cmd_creds missing'),
              (any('cmd_chain' in f for f in files), 'cmd_chain missing'),
          ]
          failures = [msg for ok, msg in checks if not ok]
          if failures:
              for f in failures: print('FAIL: ' + f)
              raise SystemExit(1)
          print('wheel OK: ' + str(len(files)) + ' files')
          PYEOF

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 3. Publish to TestPyPI
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Verify on TestPyPI
        run: |
          echo "Published to TestPyPI"
          echo "Verify at: https://test.pypi.org/project/bawbel-scanner/"
          echo ""
          echo "Test install:"
          echo "  pip install --index-url https://test.pypi.org/simple/ \\"
          echo "    --extra-index-url https://pypi.org/simple/ bawbel-scanner"
          echo ""
          echo "If OK, approve the pypi environment in GitHub to publish to PyPI."

  # 4. Publish to PyPI (requires manual approval)
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
