name: Publish to PyPI

# Triggers on a published GitHub Release (tag like v1.1.0)
# Flow:
#   Release published → Verify Tests → Build → Publish to TestPyPI
#   → (manual approval in GitHub "pypi" environment) → Publish to PyPI
on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

jobs:

  # 1. Verify tests pass
  test:
    name: Verify Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install click rich pydantic pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r scanner/ -c pyproject.toml -f screen

  # 2. Build distribution
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution
        run: |
          twine check dist/*
          echo "=== Distribution contents ==="
          ls -lh dist/

          echo "=== Wheel contents ==="
          pip install wheel
          python -c "
          import zipfile, os

          whl = [f for f in os.listdir('dist') if f.endswith('.whl')][0]
          with zipfile.ZipFile(f'dist/{whl}') as z:
              files = z.namelist()
              print('\n'.join(sorted(files)))

          # Rule files must be present
          rule_files = [f for f in files if f.endswith(('.yar', '.yaml'))]
          assert rule_files, 'ERROR: Rule files missing from wheel!'
          print(f'\n✓ Rules included: {rule_files}')

          # CLI must be scanner/cli/ package (not a stale root-level file)
          cli_pkg = [f for f in files if f.startswith('scanner/cli/')]
          assert cli_pkg, 'ERROR: scanner/cli/ package missing from wheel!'
          print(f'✓ CLI package present: scanner/cli/')

          # No stale cli.py files outside scanner/cli/
          stale = [
              f for f in files
              if 'cli' in f.lower()
              and not f.startswith('scanner/cli/')
              and f.endswith('.py')
          ]
          assert not stale, f'ERROR: Stale CLI files outside scanner/cli/: {stale}'
          print(f'✓ No stale CLI files')

          # Toxic flows package
          toxic = [f for f in files if f.startswith('scanner/toxic_flows/')]
          assert toxic, 'ERROR: scanner/toxic_flows/ missing!'
          print(f'✓ Toxic flows package present')

          # Conformance package
          conf = [f for f in files if f.startswith('scanner/conformance/')]
          assert conf, 'ERROR: scanner/conformance/ missing!'
          print(f'✓ Conformance package present')

          # OWASP MCP map
          owasp = [f for f in files if 'owasp_mcp_map' in f]
          assert owasp, 'ERROR: owasp_mcp_map.py missing!'
          print(f'✓ OWASP MCP map present')

          print('\nAll checks passed.')
          "

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 3. Publish to TestPyPI
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Verify on TestPyPI
        run: |
          echo "Published to TestPyPI"
          echo "Verify at: https://test.pypi.org/project/bawbel-scanner/"
          echo ""
          echo "Test install:"
          echo "  pip install --index-url https://test.pypi.org/simple/ \\"
          echo "    --extra-index-url https://pypi.org/simple/ bawbel-scanner"
          echo ""
          echo "If OK, approve the pypi environment in GitHub to publish to PyPI."

  # 4. Publish to PyPI (requires manual approval)
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
