name: Publish to PyPI

# Triggers on a published GitHub Release (tag like v0.1.0)
# Flow:
#   Release published → Verify Tests → Build → Publish to TestPyPI
#   → (manual approval in GitHub "pypi" environment) → Publish to PyPI
on:
  release:
    types: [published]

  # Manual trigger — useful for re-running TestPyPI without a new release
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

jobs:

  # ── 1. Verify tests pass ───────────────────────────────────────────────────
  test:
    name: Verify Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install click rich pydantic pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r scanner/ -f screen

  # ── 2. Build distribution ─────────────────────────────────────────────────
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution
        run: |
          twine check dist/*
          echo "=== Distribution contents ==="
          ls -lh dist/

          echo "=== Wheel contents ==="
          pip install wheel
          python -c "
          import zipfile, os
          whl = [f for f in os.listdir('dist') if f.endswith('.whl')][0]
          with zipfile.ZipFile(f'dist/{whl}') as z:
              files = z.namelist()
              print('\n'.join(sorted(files)))
          rule_files = [f for f in files if f.endswith(('.yar','.yaml'))]
          assert rule_files, 'ERROR: Rule files missing from wheel!'
          print(f'\n✓ Rules included: {rule_files}')
          cli_files = [f for f in files if 'cli.py' in f]
          assert any('scanner/cli' in f for f in cli_files), \
              f'ERROR: cli.py must be inside scanner/ package. Found: {cli_files}'
          print(f'✓ CLI location correct: {[f for f in cli_files if \"scanner\" in f]}')
          "

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI ─────────────────────────────────────────────────
  # Runs automatically on every release AND on manual dispatch targeting testpypi.
  # This is the gate — PyPI only runs after this succeeds AND is manually approved.
  publish-testpypi:
    name: Publish → TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Verify on TestPyPI
        run: |
          echo "✓ Published to TestPyPI"
          echo "Verify at: https://test.pypi.org/project/bawbel-scanner/"
          echo ""
          echo "Test install:"
          echo "  pip install --index-url https://test.pypi.org/simple/ \\"
          echo "    --extra-index-url https://pypi.org/simple/ bawbel-scanner"
          echo ""
          echo "If OK → approve the 'pypi' environment in GitHub to publish to PyPI."

  # ── 4. Publish to PyPI ─────────────────────────────────────────────────────
  # Only runs after publish-testpypi succeeds.
  # Requires manual approval via the "pypi" GitHub environment protection rule.
  # Set up: repo Settings → Environments → pypi → Required reviewers → add yourself
  publish-pypi:
    name: Publish → PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi          # ← waits for TestPyPI to succeed first
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
