name: Publish to PyPI

# Triggers on a published GitHub Release (tag like v1.1.0)
# Flow:
#   Release published → Verify Tests → Build → Publish to TestPyPI
#   → (manual approval in GitHub "pypi" environment) → Publish to PyPI
on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

jobs:

  # 1. Verify tests pass
  test:
    name: Verify Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r scanner/ -c pyproject.toml -f screen

  # 2. Build distribution
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution
        run: |
          twine check dist/*
          ls -lh dist/
          pip install wheel
          python3 -c "import zipfile,os; whl=[f for f in os.listdir('dist') if f.endswith('.whl')][0]; z=zipfile.ZipFile('dist/'+whl); files=z.namelist(); assert any(f.endswith(('.yar','.yaml')) for f in files),'rules missing'; assert any(f.startswith('scanner/cli/') for f in files),'cli missing'; assert any(f.startswith('scanner/toxic_flows/') for f in files),'toxic_flows missing'; assert any(f.startswith('scanner/conformance/') for f in files),'conformance missing'; assert 'scanner/justified_suppression.py' in files,'justified_suppression missing'; assert 'scanner/models/acceptance.py' in files,'acceptance missing'; assert any('cmd_accept' in f for f in files),'cmd_accept missing'; assert any('cmd_creds' in f for f in files),'cmd_creds missing'; assert any('cmd_chain' in f for f in files),'cmd_chain missing'; print('wheel OK: '+str(len(files))+' files')"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 3. Publish to TestPyPI
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Verify on TestPyPI
        run: |
          echo "Published to TestPyPI"
          echo "Verify at: https://test.pypi.org/project/bawbel-scanner/"
          echo ""
          echo "Test install:"
          echo "  pip install --index-url https://test.pypi.org/simple/ \\"
          echo "    --extra-index-url https://pypi.org/simple/ bawbel-scanner"
          echo ""
          echo "If OK, approve the pypi environment in GitHub to publish to PyPI."

  # 4. Publish to PyPI (requires manual approval)
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/bawbel-scanner
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
