name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install black==24.4.2 flake8 flake8-bugbear flake8-simplify flake8-bandit flake8-pyproject bandit

      - name: Check formatting (black)
        run: black --check --config pyproject.toml scanner/

      - name: Lint (flake8)
        run: flake8 scanner/ --max-line-length 100

      - name: Security lint (bandit)
        run: bandit -r scanner/ -c pyproject.toml

  # ── Test matrix ────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests (Stage 1 only - no optional deps)
        run: python -m pytest tests/ -v --tb=short -m "not integration and not slow" --cov=scanner --cov-report=html

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ── Integration tests (with semgrep) ──────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install all deps including semgrep
        run: |
          pip install --upgrade pip
          pip install -e ".[semgrep]"
          pip install pytest pytest-cov

      - name: Run full test suite with semgrep engine
        run: python -m pytest tests/ -v --tb=short

  # ── Docker build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bawbel/scanner:test .

      - name: Smoke test Docker image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/fixtures/skills/malicious:/scan:ro \
            bawbel/scanner:test scan /scan/malicious_skill.md

      - name: Verify Docker finds HIGH or CRITICAL finding
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/fixtures/skills/malicious:/scan:ro \
            bawbel/scanner:test scan /scan/malicious_skill.md --format json \
            > /tmp/bawbel_scan.json
          cat /tmp/bawbel_scan.json
          python3 -c "import json; data=json.load(open('/tmp/bawbel_scan.json')); findings=data[0]['findings']; max_score=max(f['aivss_score'] for f in findings); assert len(findings)>=1; assert max_score>=7.0, str(max_score); print(str(len(findings))+' findings, max AIVSS '+str(max_score))"
